version: '3.8'

services:
  db:
    image: mysql:8
    container_name: ss-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sanosysalvos
      MYSQL_USER: local_user
      MYSQL_PASSWORD: local_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api-gateway:
    build: ./backend/api-gateway
    container_name: ss-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - pet-service
      - geo-service
      - match-service
    environment:
      - PORT=8080
      - PET_SERVICE_URL=http://pet-service:3001
      - GEO_SERVICE_URL=http://geo-service:3002
      - MATCH_SERVICE_URL=http://match-service:3003

  pet-service:
    build: ./backend/pet-service
    container_name: ss-pet-service
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=local_user
      - DB_PASS=local_password
      - DB_NAME=sanosysalvos

  geo-service:
    build: ./backend/geo-service
    container_name: ss-geo-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  match-service:
    build: ./backend/match-service
    container_name: ss-match-service
    ports:
      - "3003:3003"
    depends_on:
      - pet-service
    environment:
      - PORT=3003
      - PET_SERVICE_URL=http://pet-service:3001

volumes:
  mysql_data:
