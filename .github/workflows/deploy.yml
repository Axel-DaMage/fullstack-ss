name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -t rsa -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # Navegamos al directorio del proyecto (asumiendo que clonaste previamente en el servidor)
          cd /home/ubuntu/fullstack-ss-parcial1 || exit
          
          # Actualizar código
          git pull origin master
          
          # Re-construir imágenes
          docker-compose build
          
          # Levantar servicios desacoplados
          docker-compose up -d
        EOF
