server.port=3001
spring.application.name=pet-service

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sanosysalvos}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:local_user}
spring.datasource.password=${DB_PASS:local_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Data JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
